<!-- TopAppBar (Web) -->

<div class="flex justify-between items-center px-8 py-4 w-full max-w-7xl mx-auto">
<div class="text-xl font-black text-green-800 dark:text-green-500 tracking-tighter">PulseGuard</div>
<div class="flex items-center gap-6">
<!-- Navigation links would go here if defined in TopAppBar JSON labels, using active state for Profile -->
<nav class="flex gap-8">
<span class="text-slate-400 dark:text-slate-500 hover:opacity-80 transition-opacity font-['Inter'] font-bold tracking-tight active:scale-95 duration-300 cursor-pointer">Dashboard</span>
<span class="text-green-700 dark:text-green-400 font-bold hover:opacity-80 transition-opacity font-['Inter'] tracking-tight active:scale-95 duration-300 cursor-pointer">Profile</span>
</nav>
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined text-green-700 dark:text-green-400">notifications</span>
</button>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined text-green-700 dark:text-green-400 font-bold" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</button>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter pt-24 md:pt-32 pb-40">
<!-- Matte Card for QR Code -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_40px_60px_-15px_rgba(0,0,0,0.05)] p-stack-md flex flex-col items-center max-w-sm w-full relative mb-stack-md">
<!-- Status Chip -->
<div class="absolute -top-4 bg-tertiary-container text-on-tertiary-container font-label-sm text-label-sm px-4 py-2 rounded-full shadow-sm flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary-fixed animate-pulse"></span>
                Active Monitoring
            </div>
<!-- QR Code Placeholder -->
<div class="w-full aspect-square bg-surface-container-low rounded-lg p-4 flex items-center justify-center mb-6">

</div>
<div class="text-center w-full">
<h1 class="font-headline-md text-headline-md text-on-surface mb-unit">Evelyn Harper</h1>
<div class="flex justify-center items-center gap-3 mb-stack-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">Blood Type</span>
<span class="bg-error-container text-on-error-container font-headline-md text-headline-md px-3 py-1 rounded-DEFAULT border border-error/20">O-</span>
</div>
<div class="bg-surface-container-low rounded-DEFAULT p-4 mt-4 w-full text-left">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1 uppercase">Primary Contact</p>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">David Harper</p>
<p class="font-body-md text-body-md text-primary mt-1 flex items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-[18px]">call</span>
                        +1 (555) 019-8472
                    </p>
</div>
</div>
</div>
<p class="font-body-md text-body-md text-outline-variant text-center max-w-xs">
            Scan in case of emergency for full medical profile and directives.
        </p>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-white/30 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl glassmorphism backdrop-saturate-150 shadow-[0_20px_50px_rgba(0,0,0,0.1)] z-50 flex justify-around items-center px-6 py-3">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors active:scale-95 duration-300 group">
<span class="material-symbols-outlined mb-1">grid_view</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Home</span>
</button>
<!-- Track -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors active:scale-95 duration-300 group">
<span class="material-symbols-outlined mb-1">distance</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Track</span>
</button>
<!-- SOS -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors active:scale-95 duration-300 group relative -top-4">
<div class="bg-error text-on-error p-3 rounded-full shadow-[0_0_20px_rgba(186,26,26,0.4)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emergency</span>

<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-2 text-error">SOS</span>

<span class="material-symbols-outlined mb-1">chat_bubble</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Chat</span>
</button>

<button class="flex flex-col items-center justify-center text-green-700 dark:text-green-400 scale-110 transition-transform Active: ring-4 ring-green-500/10 rounded-full transition-all group">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Profile</span>
</button>
