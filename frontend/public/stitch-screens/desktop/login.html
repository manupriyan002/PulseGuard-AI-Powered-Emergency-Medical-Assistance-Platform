<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PulseGuard - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-container": "#eeeeec",
                        "primary-fixed": "#95f8a7",
                        "on-secondary-fixed": "#092009",
                        "secondary-fixed-dim": "#b1cfaa",
                        "on-primary-fixed": "#00210a",
                        "primary-fixed-dim": "#79db8d",
                        "on-background": "#1a1c1b",
                        "outline": "#6f7a6e",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#79db8d",
                        "on-secondary-fixed-variant": "#344d31",
                        "tertiary-fixed-dim": "#afceba",
                        "surface-container-high": "#e8e8e6",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#cdebc5",
                        "on-surface": "#1a1c1b",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#f1f1ef",
                        "outline-variant": "#becabc",
                        "surface-container-highest": "#e2e3e1",
                        "surface-container-low": "#f4f4f2",
                        "primary": "#00652c",
                        "on-secondary-container": "#516b4d",
                        "surface": "#f9f9f7",
                        "background": "#f9f9f7",
                        "on-primary": "#ffffff",
                        "primary-container": "#15803d",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#005323",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#3f493f",
                        "surface-dim": "#dadad8",
                        "tertiary-fixed": "#caead6",
                        "surface-variant": "#e2e3e1",
                        "surface-tint": "#006d30",
                        "tertiary-container": "#597665",
                        "inverse-surface": "#2f3130",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9f7",
                        "tertiary": "#415d4d",
                        "on-tertiary-fixed-variant": "#314d3e",
                        "on-tertiary-container": "#dcfce7",
                        "on-tertiary-fixed": "#042014",
                        "secondary-container": "#cdebc5",
                        "secondary": "#4b6547",
                        "on-primary-container": "#d3ffd5"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "container-padding": "40px",
                        "stack-lg": "48px",
                        "gutter": "24px",
                        "stack-sm": "12px",
                        "stack-md": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-xl": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen w-full flex overflow-hidden font-body-md text-body-md">
<!-- Left Visual Panel (Hidden on Mobile) -->
<div class="hidden lg:flex flex-1 relative bg-surface-variant overflow-hidden">
<img alt="Medical Abstract" class="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-80" data-alt="A stunning, ultra-high-definition 3D render of an abstract, futuristic biological heart or cellular structure, serving as a metaphor for advanced healthcare and monitoring. The object is rendered with a glossy, tactile finish, suspended gracefully in a pristine, expansive white void. The lighting is soft, high-key, and diffused, casting long, elegant, barely-there shadows that emphasize depth and clinical luxury. Subtle glowing accents in a soothing, vibrant emerald green contrast with the otherwise pure white and matte silver surroundings, evoking a sense of calm, precision, and modern medical technology." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhxKnKKsNcWP5wxD3AWhKiqA1ywnfXKnXXSqtt0v3cFEH_WLMwoxq0-w1cK_D7ClB2czGwYNkxd6zInEENTBsZfINHdtm1QON1lNhCRxRbPmrHOzHVy5pIteIk70wxDv2rmOQ0Ji0wpKygnAcO-dG9-EwkgGJxTjb7XeJ-G_cLNTuM4-WCvQcQFA0oZ-ZjLWy5M6znPLejCrTIFykEfdirUyENG-ngu0LZSkd3NZvQgSIOufhsHgHIwzJ-HPT2gvX0Zgez2-RGv-c"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-50"></div>
<!-- Subtle branding overlay on image -->
<div class="absolute bottom-12 left-12 flex items-center gap-3">
<div class="w-12 h-12 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-2xl">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="ecg" data-weight="fill" style="font-variation-settings: 'FILL' 1;">ecg</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">PulseGuard</span>
</div>
</div>
<!-- Right Login Panel -->
<div class="flex-1 flex flex-col justify-center items-center px-container-padding bg-background overflow-y-auto">
<div class="w-full max-w-md flex flex-col">
<!-- Mobile Logo (Hidden on Desktop) -->
<div class="lg:hidden flex items-center gap-3 mb-stack-lg justify-center">
<div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary text-xl" data-icon="ecg" data-weight="fill" style="font-variation-settings: 'FILL' 1;">ecg</span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">PulseGuard</span>
</div>
<!-- Matte Card Container -->
<div class="bg-surface-container-lowest rounded-lg p-10 shadow-2xl flex flex-col gap-stack-md w-full relative z-10">
<!-- Header -->
<div class="text-center mb-stack-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to your clinical dashboard.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-sm w-full">
<!-- Email Input (Recessed Style) -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant pl-4" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container rounded-full shadow-inner text-on-surface placeholder:text-outline-variant border-none focus:ring-2 focus:ring-primary/30 focus:outline-none transition-all font-body-md text-body-md" id="email" placeholder="doctor@pulseguard.com" type="email"/>
</div>
</div>
<!-- Password Input (Recessed Style) -->
<div class="flex flex-col gap-2 mt-4">
<label class="font-label-sm text-label-sm text-on-surface-variant pl-4 flex justify-between w-full" for="password">
<span>Password</span>
<a class="text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-6 py-4 bg-surface-container rounded-full shadow-inner text-on-surface placeholder:text-outline-variant border-none focus:ring-2 focus:ring-primary/30 focus:outline-none transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="mt-8 w-full py-4 bg-primary text-on-primary rounded-full shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 active:shadow-md transition-all font-label-sm text-label-sm uppercase tracking-widest flex items-center justify-center gap-2 group" type="button">
                        Sign In
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-4 mt-2">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-outline">OR</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- SSO Button -->
<button class="w-full py-4 bg-surface text-on-surface rounded-full shadow-inner hover:bg-surface-container-high transition-colors border border-surface-variant font-label-sm text-label-sm flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Provider
                </button>
</div>
<!-- Footer -->
<p class="text-center mt-stack-md font-body-md text-body-md text-on-surface-variant">
                Need help? <a class="text-primary font-semibold hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
</body></html>
