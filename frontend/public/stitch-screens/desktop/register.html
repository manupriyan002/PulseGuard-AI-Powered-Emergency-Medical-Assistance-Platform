<!-- Header -->
<div class="mb-12">
<div class="md:hidden flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">vital_signs</span>
<span class="font-headline-md text-headline-md text-primary tracking-tight">PulseGuard</span>

<h1 class="font-headline-lg text-headline-lg text-on-surface mb-3">Create an account</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Join our secure network for premium health monitoring and rapid response.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-4">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full bg-surface-container text-on-surface font-body-md text-body-md py-4 pl-14 pr-6 rounded-full border-none focus:ring-2 focus:ring-primary shadow-[inset_0_2px_6px_rgba(0,0,0,0.04)] placeholder:text-outline transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-4">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full bg-surface-container text-on-surface font-body-md text-body-md py-4 pl-14 pr-6 rounded-full border-none focus:ring-2 focus:ring-primary shadow-[inset_0_2px_6px_rgba(0,0,0,0.04)] placeholder:text-outline transition-all" placeholder="hello@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-4">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">phone</span>
<input class="w-full bg-surface-container text-on-surface font-body-md text-body-md py-4 pl-14 pr-6 rounded-full border-none focus:ring-2 focus:ring-primary shadow-[inset_0_2px_6px_rgba(0,0,0,0.04)] placeholder:text-outline transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase ml-4">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full bg-surface-container text-on-surface font-body-md text-body-md py-4 pl-14 pr-6 rounded-full border-none focus:ring-2 focus:ring-primary shadow-[inset_0_2px_6px_rgba(0,0,0,0.04)] placeholder:text-outline transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="pt-6">
<button class="group relative w-full flex items-center justify-between p-2 pl-8 bg-primary rounded-full hover:bg-surface-tint transition-all duration-300 shadow-[0_12px_30px_-10px_rgba(0,101,44,0.4)] hover:shadow-[0_16px_40px_-10px_rgba(0,101,44,0.5)] active:scale-[0.98]" type="button">
<span class="font-label-sm text-label-sm text-on-primary uppercase tracking-widest">Create Account</span>
<div class="w-12 h-12 bg-on-primary rounded-full flex items-center justify-center text-primary group-hover:scale-105 transition-transform duration-300 shadow-inner">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</div>
</button>

<p class="font-body-md text-body-md text-on-surface-variant">

</p>
