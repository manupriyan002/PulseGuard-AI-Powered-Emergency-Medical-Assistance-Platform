<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PulseGuard - OTP Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "surface-container": "#eeeeec",
                    "primary-fixed": "#95f8a7",
                    "on-secondary-fixed": "#092009",
                    "secondary-fixed-dim": "#b1cfaa",
                    "on-primary-fixed": "#00210a",
                    "primary-fixed-dim": "#79db8d",
                    "on-background": "#1a1c1b",
                    "outline": "#6f7a6e",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#79db8d",
                    "on-secondary-fixed-variant": "#344d31",
                    "tertiary-fixed-dim": "#afceba",
                    "surface-container-high": "#e8e8e6",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#cdebc5",
                    "on-surface": "#1a1c1b",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f1f1ef",
                    "outline-variant": "#becabc",
                    "surface-container-highest": "#e2e3e1",
                    "surface-container-low": "#f4f4f2",
                    "primary": "#00652c",
                    "on-secondary-container": "#516b4d",
                    "surface": "#f9f9f7",
                    "background": "#f9f9f7",
                    "on-primary": "#ffffff",
                    "primary-container": "#15803d",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#005323",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f493f",
                    "surface-dim": "#dadad8",
                    "tertiary-fixed": "#caead6",
                    "surface-variant": "#e2e3e1",
                    "surface-tint": "#006d30",
                    "tertiary-container": "#597665",
                    "inverse-surface": "#2f3130",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f9f9f7",
                    "tertiary": "#415d4d",
                    "on-tertiary-fixed-variant": "#314d3e",
                    "on-tertiary-container": "#dcfce7",
                    "on-tertiary-fixed": "#042014",
                    "secondary-container": "#cdebc5",
                    "secondary": "#4b6547",
                    "on-primary-container": "#d3ffd5"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "container-padding": "40px",
                    "stack-lg": "48px",
                    "gutter": "24px",
                    "stack-sm": "12px",
                    "stack-md": "24px"
            },
            "fontFamily": {
                    "headline-md": [
                            "Inter"
                    ],
                    "label-sm": [
                            "Inter"
                    ],
                    "headline-xl": [
                            "Inter"
                    ],
                    "body-md": [
                            "Inter"
                    ],
                    "body-lg": [
                            "Inter"
                    ],
                    "headline-lg": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "headline-md": [
                            "24px",
                            {
                                    "lineHeight": "1.4",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-sm": [
                            "13px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"
                            }
                    ],
                    "headline-xl": [
                            "64px",
                            {
                                    "lineHeight": "1.1",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "1.6",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-lg": [
                            "40px",
                            {
                                    "lineHeight": "1.2",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "700"
                            }
                    ]
            }
    },
        },
      }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden font-body-md text-body-md antialiased text-on-surface">
<!-- Ambient Background Elements for Depth -->
<div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed-dim/20 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-tertiary-fixed-dim/20 blur-[100px] pointer-events-none"></div>
<!-- Main Verification Card -->
<!-- Applies Matte Minimalism: pure white (surface-container-lowest), 32px radius (lg), soft shadow -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-lg shadow-[0_40px_80px_rgba(0,0,0,0.06)] px-10 py-12 flex flex-col items-center text-center relative z-10">
<!-- Icon/Logo Container -->
<div class="w-16 h-16 bg-secondary-container rounded-full flex items-center justify-center mb-stack-md shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)] ring-4 ring-background/50">
<span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<!-- Typography Hierarchy -->
<h1 class="font-headline-lg text-headline-lg text-primary mb-2 tracking-tight">PulseGuard</h1>
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Identity Verification</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-lg max-w-[320px]">
            Please enter the secure 6-digit code transmitted to your registered mobile device.
        </p>
<!-- OTP Input Array -->
<div class="flex gap-3 justify-center w-full mb-stack-lg">
<!-- Recessed, borderless inputs per design guidelines -->
<input aria-label="Digit 1" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
<input aria-label="Digit 2" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
<input aria-label="Digit 3" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
<input aria-label="Digit 4" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
<input aria-label="Digit 5" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
<input aria-label="Digit 6" class="w-[52px] h-[64px] bg-surface-container text-center font-headline-md text-headline-md text-on-surface rounded border-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.04)] focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-surface-variant outline-none" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Primary Action -->
<!-- Pill-shaped, brand green, embossed effect via inner shadow -->
<button class="w-full bg-primary text-on-primary py-[18px] rounded-full font-label-sm text-label-sm uppercase tracking-widest hover:opacity-95 transition-all flex items-center justify-center gap-3 group shadow-[0_12px_24px_rgba(0,101,44,0.15)] shadow-[inset_0_1px_1px_rgba(255,255,255,0.2)] active:scale-[0.98]">
<span class="material-symbols-outlined text-lg opacity-80" style="font-variation-settings: 'FILL' 1;">lock_open</span>
            Authenticate
            <span class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center ml-2 shadow-[inset_0_1px_2px_rgba(0,0,0,0.2)] group-hover:bg-primary-fixed-variant transition-colors">
<span class="material-symbols-outlined text-[16px] text-on-primary-container">arrow_forward</span>
</span>
</button>
<!-- Secondary Action -->
<div class="mt-8">
<p class="font-label-sm text-label-sm text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">refresh</span>
                Didn't receive the code? 
                <a class="text-primary hover:text-primary-container transition-colors ml-1 border-b border-primary/30 pb-0.5" href="#">Resend in 0:59</a>
</p>
</div>
</main>
</body></html>
