<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PulseGuard - Hospital Finder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "surface-container": "#eeeeec",
                    "primary-fixed": "#95f8a7",
                    "on-secondary-fixed": "#092009",
                    "secondary-fixed-dim": "#b1cfaa",
                    "on-primary-fixed": "#00210a",
                    "primary-fixed-dim": "#79db8d",
                    "on-background": "#1a1c1b",
                    "outline": "#6f7a6e",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#79db8d",
                    "on-secondary-fixed-variant": "#344d31",
                    "tertiary-fixed-dim": "#afceba",
                    "surface-container-high": "#e8e8e6",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#cdebc5",
                    "on-surface": "#1a1c1b",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f1f1ef",
                    "outline-variant": "#becabc",
                    "surface-container-highest": "#e2e3e1",
                    "surface-container-low": "#f4f4f2",
                    "primary": "#00652c",
                    "on-secondary-container": "#516b4d",
                    "surface": "#f9f9f7",
                    "background": "#f9f9f7",
                    "on-primary": "#ffffff",
                    "primary-container": "#15803d",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#005323",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f493f",
                    "surface-dim": "#dadad8",
                    "tertiary-fixed": "#caead6",
                    "surface-variant": "#e2e3e1",
                    "surface-tint": "#006d30",
                    "tertiary-container": "#597665",
                    "inverse-surface": "#2f3130",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f9f9f7",
                    "tertiary": "#415d4d",
                    "on-tertiary-fixed-variant": "#314d3e",
                    "on-tertiary-container": "#dcfce7",
                    "on-tertiary-fixed": "#042014",
                    "secondary-container": "#cdebc5",
                    "secondary": "#4b6547",
                    "on-primary-container": "#d3ffd5"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "container-padding": "40px",
                    "stack-lg": "48px",
                    "gutter": "24px",
                    "stack-sm": "12px",
                    "stack-md": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-xl": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "label-sm": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-xl": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #dadad8;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-background font-body-md text-body-md text-on-surface antialiased selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-white/20 backdrop-blur-md shadow-[0_10px_40px_rgba(0,0,0,0.04)] bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl transition-all duration-300 hidden md:block">
<div class="flex justify-between items-center px-8 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4 hover:opacity-80 transition-opacity cursor-pointer">
<span class="material-symbols-outlined icon-fill text-green-700 dark:text-green-400 text-3xl">ecg_heart</span>
<span class="text-xl font-black text-green-800 dark:text-green-500 tracking-tighter font-['Inter']">PulseGuard</span>
</div>
<div class="flex items-center gap-6">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-300 text-green-700 dark:text-green-400 font-bold flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-highest/50">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-300 text-slate-400 dark:text-slate-500 flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-highest/50">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Layout -->
<main class="flex flex-col md:flex-row h-screen w-full relative pt-0 md:pt-[76px] pb-[88px] md:pb-0">
<!-- Sidebar / Bottom Sheet List -->
<section class="w-full md:w-[460px] lg:w-[500px] h-[563px] md:h-full bg-surface flex flex-col z-20 absolute bottom-0 md:relative shadow-[0_-30px_60px_rgba(0,0,0,0.08)] md:shadow-[30px_0_60px_rgba(0,0,0,0.03)] rounded-t-[40px] md:rounded-none transition-transform duration-500">
<!-- Mobile Handle -->
<div class="w-full flex justify-center pt-4 pb-2 md:hidden">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<div class="px-gutter pt-stack-sm pb-stack-md flex-shrink-0">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm tracking-tight">Nearby Facilities</h1>
<!-- Search Input -->
<div class="relative w-full shadow-sm rounded-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-container-low text-on-surface font-body-md text-body-md rounded-full py-4 pl-12 pr-4 border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors shadow-inner placeholder:text-outline-variant" placeholder="Search hospitals, clinics, or specialties..." type="text"/>
</div>
<!-- Quick Filters -->
<div class="flex gap-unit mt-stack-sm overflow-x-auto pb-2 scrollbar-hide">
<button class="flex-shrink-0 bg-primary text-on-primary px-4 py-2 rounded-full font-label-sm text-label-sm shadow-md">All ERs</button>
<button class="flex-shrink-0 bg-surface-container-low text-on-surface-variant px-4 py-2 rounded-full font-label-sm text-label-sm hover:bg-surface-container transition-colors">Trauma Center</button>
<button class="flex-shrink-0 bg-surface-container-low text-on-surface-variant px-4 py-2 rounded-full font-label-sm text-label-sm hover:bg-surface-container transition-colors">Pediatric</button>
</div>
</div>
<!-- Hospital List -->
<div class="flex-1 overflow-y-auto px-gutter pb-gutter flex flex-col gap-stack-md">
<!-- Card 1: Urgent/Closest -->
<article class="bg-surface-container-lowest rounded-[32px] p-6 shadow-[0_40px_60px_-15px_rgba(0,0,0,0.05)] border border-surface-container-highest/30 flex flex-col gap-4 relative overflow-hidden group hover:shadow-[0_40px_80px_-15px_rgba(0,0,0,0.08)] transition-shadow duration-300">
<div class="absolute top-0 right-0 w-32 h-32 bg-error/5 rounded-bl-[100px] -z-10 transition-transform group-hover:scale-110"></div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Mercy General</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Level 1 Trauma Center</p>
</div>
<div class="bg-surface-container-low rounded-full p-2 flex items-center justify-center text-primary">
<span class="material-symbols-outlined icon-fill">directions</span>
</div>
</div>
<div class="flex flex-wrap gap-3 mt-2">
<div class="bg-error-container text-on-error-container px-3 py-1.5 rounded-full font-label-sm text-label-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span>12 Min ER Wait</span>
</div>
<div class="bg-surface-container text-on-surface-variant px-3 py-1.5 rounded-full font-label-sm text-label-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">location_on</span>
<span>1.8 mi</span>
</div>
</div>
<div class="mt-2 pt-4 border-t border-surface-variant flex gap-4">
<button class="flex-1 bg-primary text-on-primary py-3.5 rounded-full font-label-sm text-label-sm flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(0,101,44,0.2)] hover:bg-surface-tint transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]">navigation</span>
                            Navigate Now
                        </button>
</div>
</article>
<!-- Card 2: Standard -->
<article class="bg-surface-container-lowest rounded-[32px] p-6 shadow-[0_40px_60px_-15px_rgba(0,0,0,0.03)] border border-surface-container-highest/30 flex flex-col gap-4 relative overflow-hidden group hover:shadow-[0_40px_80px_-15px_rgba(0,0,0,0.06)] transition-shadow duration-300">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-[100px] -z-10 transition-transform group-hover:scale-110"></div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Valley Health Clinic</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Urgent Care &amp; Family Med</p>
</div>
</div>
<div class="flex flex-wrap gap-3 mt-2">
<div class="bg-tertiary-container text-on-tertiary-container px-3 py-1.5 rounded-full font-label-sm text-label-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span>5 Min Wait</span>
</div>
<div class="bg-surface-container text-on-surface-variant px-3 py-1.5 rounded-full font-label-sm text-label-sm flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]">location_on</span>
<span>3.2 mi</span>
</div>
</div>
<div class="mt-2 pt-4 border-t border-surface-variant flex gap-4">
<button class="flex-1 bg-surface-container-low text-on-surface py-3.5 rounded-full font-label-sm text-label-sm flex items-center justify-center gap-2 hover:bg-surface-container transition-colors active:scale-95">
                            Details
                        </button>
</div>
</article>
<!-- Spacer for bottom scroll on mobile -->
<div class="h-24 md:h-8"></div>
</div>
</section>
<!-- Map Canvas Area -->
<section class="flex-1 h-[460px] md:h-full relative bg-surface-container-low z-10 overflow-hidden">
<!-- Map Base Image -->
<img alt="City Map" class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-multiply" data-alt="A highly detailed, minimalist top-down digital map interface showing city streets and topography. The map utilizes a serene, desaturated color palette of light grays and soft sage greens to perfectly match a clinical light-mode aesthetic. Soft, diffused lighting prevents any harsh contrasts, creating a calming and authoritative navigation experience tailored for a premium medical application. Subtle depth cues indicate major roads without visual clutter." data-location="City Map" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_-aSi3SeMNut4PDI5dGJHCX-SWH0S7IFSiZEMO7nDS7oHig33iW2kqbX6X1DwQobTn5dFUjOIPmm9dNTTgfiRTyO5GRwud_9XdLqaR5I-pl8mOohlajigxuoGKJs5bYNTzsBkm-y5dq2vFP21eiI6D4ZLUk7X8OmpbsIsxit1mP1-BYvYX9qfs1LF2Xy2QW3wTv-mNog0sgSfaRoTq5r1Dlznp-iuLAi78xG7tAlmeKZhF0sQD5i7lTE0V4vXYptJaiEWyUN8ah8"/>
<!-- Vignette overlay for depth -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-surface/20 to-surface/60 pointer-events-none"></div>
<!-- Custom Pins over map -->
<!-- Pin 1: Active/Selected -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center group cursor-pointer z-20">
<div class="bg-surface-container-lowest px-3 py-1.5 rounded-full shadow-lg font-label-sm text-label-sm text-on-surface mb-2 border border-surface-variant whitespace-nowrap opacity-100 transition-opacity">
                    Mercy Gen <span class="text-error ml-1 font-bold">12m</span>
</div>
<div class="relative w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-[0_10px_30px_rgba(0,101,44,0.4)] border-4 border-surface-container-lowest scale-110 transition-transform">
<span class="material-symbols-outlined icon-fill text-on-primary text-2xl">local_hospital</span>
<!-- Pulse effect -->
<div class="absolute inset-0 rounded-full border-2 border-primary animate-ping opacity-30"></div>
</div>
<!-- Pin shadow on map -->
<div class="w-8 h-2 bg-black/20 rounded-[100%] mt-2 blur-[2px]"></div>
</div>
<!-- Pin 2: Inactive -->
<div class="absolute top-1/2 right-1/4 translate-x-1/4 -translate-y-1/4 flex flex-col items-center group cursor-pointer z-10">
<div class="bg-surface-container-lowest px-3 py-1.5 rounded-full shadow-md font-label-sm text-label-sm text-on-surface mb-2 border border-surface-variant whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">
                    Valley Clinic
                </div>
<div class="w-10 h-10 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-md border-2 border-primary text-primary transition-transform group-hover:scale-110">
<span class="material-symbols-outlined icon-fill text-lg">medical_services</span>
</div>
<div class="w-6 h-1.5 bg-black/15 rounded-[100%] mt-1 blur-[1px]"></div>
</div>
<!-- Floating Recenter Button -->
<button class="absolute bottom-6 md:bottom-12 right-6 w-14 h-14 bg-surface-container-lowest rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.1)] flex items-center justify-center text-on-surface hover:text-primary transition-colors hover:shadow-[0_15px_40px_rgba(0,0,0,0.15)] active:scale-95">
<span class="material-symbols-outlined">my_location</span>
</button>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-white/30 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl glassmorphism backdrop-saturate-150 shadow-[0_20px_50px_rgba(0,0,0,0.1)] z-[100]">
<div class="flex justify-around items-center px-6 py-3">
<!-- Active Item: Home -->
<button class="flex flex-col items-center justify-center text-green-700 dark:text-green-400 scale-110 transition-transform Active: ring-4 ring-green-500/10 rounded-full transition-all group">
<span class="material-symbols-outlined icon-fill mb-1">grid_view</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Home</span>
</button>
<!-- Inactive Items -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors group active:scale-95 duration-300">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">distance</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Track</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors group active:scale-95 duration-300 relative">
<div class="absolute -top-6 bg-error text-on-error w-14 h-14 rounded-full flex items-center justify-center shadow-[0_10px_20px_rgba(186,26,26,0.3)] border-4 border-surface-container-lowest">
<span class="material-symbols-outlined icon-fill text-2xl">emergency</span>
</div>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-8">SOS</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors group active:scale-95 duration-300">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">chat_bubble</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Chat</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-green-600 transition-colors group active:scale-95 duration-300">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">person</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest">Profile</span>
</button>
</div>
</nav>
</body></html>
