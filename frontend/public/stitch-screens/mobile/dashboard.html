<style>
        /* Hide scrollbar for clean dashboard look */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-nav-blur {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        
        .matte-shadow {
            box-shadow: 0 20px 60px -15px rgba(0,0,0,0.05);
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background min-h-screen text-on-background font-body-md text-body-md antialiased selection:bg-primary-container selection:text-on-primary-container relative pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/60 dark:bg-zinc-900/60 backdrop-blur-xl border-b border-white/20 dark:border-zinc-800/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] flex items-center justify-between px-6 h-16">
<button class="flex items-center justify-center text-green-700 dark:text-green-500 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="text-xl font-bold tracking-tighter text-zinc-900 dark:text-white">PulseGuard</h1>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant bg-surface-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up portrait of a young woman with a calm, reassuring expression. The lighting is soft, high-key, and diffused, creating a premium, clean aesthetic suitable for a medical wellness app. The background is a soft, out-of-focus pristine white." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2shYNFbI3yutVO4BwLTa-zcq1UpfuzlX_Qof68G7m_Q1yjhPOQxW9x7tvv-O1Be2JDPdbakHUKBmCYOnnPFC2OcjIgcXQBS7NOypX6D3OCoo6IENh_aEdSuBJmb2IQx7SuDrzynfN1tbvzmL2F7tKYPolzqcwQ4eU7AhuHyPJ5HuPHNo52gSlZxi1TLHp23qrgFMTjQH46-YgO8eY-JlTyWaAeTYmtZXmthSX_L32josrnhJmjXN6h77I_Ef3SbEz23Mh-xg-Q2g"/>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-[100px] px-gutter flex flex-col gap-stack-lg max-w-md mx-auto">
<!-- Greeting -->
<section class="flex flex-col gap-unit">
<h2 class="font-headline-lg text-headline-lg text-primary tracking-tight">
                Good morning,<br/>
<span class="text-on-background">Sarah.</span>
</h2>
<div class="flex items-center gap-2 mt-2">
<div class="w-2.5 h-2.5 rounded-full bg-[#10B981] shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
<p class="font-body-md text-body-md text-on-surface-variant">System nominal. Monitoring active.</p>
</div>
</section>
<!-- SOS Orb (Central Focal Point) -->
<section class="flex justify-center items-center py-stack-md">
<!-- Outer rings mimicking skeuomorphic depth and pulsing glow -->
<div class="relative flex items-center justify-center w-[240px] h-[240px]">
<div class="absolute inset-0 rounded-full border border-error-container/50 shadow-[0_0_0_20px_rgba(255,218,214,0.3),0_0_0_40px_rgba(255,218,214,0.1)]"></div>
<button class="relative w-[180px] h-[180px] rounded-full bg-gradient-to-b from-error to-[#8A0000] shadow-[0_20px_40px_rgba(186,26,26,0.3),inset_0_4px_10px_rgba(255,255,255,0.2)] flex flex-col items-center justify-center gap-2 active:scale-[0.98] transition-transform duration-300 ease-out group">
<span class="material-symbols-outlined text-on-error text-[48px] drop-shadow-md group-active:scale-90 transition-transform" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-label-sm text-label-sm text-on-error/90 uppercase tracking-widest drop-shadow-sm">Tap to Alert</span>
</button>
</div>
</section>
<!-- Health Widgets (Bento Grid) -->
<section class="grid grid-cols-2 gap-stack-sm pb-10">
<!-- Heart Rate (Wide Card) -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-stack-md matte-shadow flex flex-col gap-4 relative overflow-hidden">
<!-- Decorative background gradient mimicking clinical light -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/5 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
<div class="flex justify-between items-start z-10">
<div class="flex items-center gap-2 text-primary">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Heart Rate</span>
</div>
<div class="bg-tertiary-fixed text-on-tertiary-fixed px-3 py-1 rounded-full font-label-sm text-label-sm">
                        Normal
                    </div>
</div>
<div class="flex items-end gap-2 z-10">
<span class="font-headline-xl text-headline-xl text-on-background">72</span>
<span class="font-body-md text-body-md text-on-surface-variant mb-2">bpm</span>
</div>
</div>
<!-- Steps (Square Card) -->
<div class="bg-surface-container-lowest rounded-lg p-stack-md matte-shadow flex flex-col justify-between aspect-square">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">directions_walk</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="font-headline-md text-headline-md text-on-background">4,231</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Steps</span>
</div>
</div>
<!-- Sleep (Square Card) -->
<div class="bg-surface-container-lowest rounded-lg p-stack-md matte-shadow flex flex-col justify-between aspect-square">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-[#E0E7FF] flex items-center justify-center text-[#4338CA]">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">bedtime</span>
</div>
</div>
<div class="flex flex-col gap-1">
<span class="font-headline-md text-headline-md text-on-background">6h 45m</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Sleep</span>
</div>
</div>
</section>
</main>

<nav class="fixed bottom-0 w-full z-50 rounded-t-[32px] border-t border-white/30 dark:border-zinc-800/50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex justify-around items-center px-4 pt-3 pb-8 bg-white/70 dark:bg-zinc-900/70 glass-nav-blur font-['Inter'] text-[10px] uppercase tracking-widest font-bold text-green-700 dark:text-green-500">
<!-- Active Item (Home) -->
<button class="flex flex-col items-center justify-center bg-green-50 dark:bg-green-950/30 text-green-700 dark:text-green-400 rounded-full w-12 h-12 shadow-inner active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined group-hover:opacity-80 transition-opacity" style="font-variation-settings: 'FILL' 1;">home</span>
</button>

<button class="flex flex-col items-center justify-center text-zinc-400 h-12 w-12 hover:text-green-600 dark:hover:text-green-300 transition-colors active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined group-hover:opacity-80 transition-opacity">insights</span>
</button>

<span class="material-symbols-outlined group-hover:opacity-80 transition-opacity">emergency_home</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 h-12 w-12 hover:text-green-600 dark:hover:text-green-300 transition-colors active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined group-hover:opacity-80 transition-opacity">chat_bubble</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 h-12 w-12 hover:text-green-600 dark:hover:text-green-300 transition-colors active:scale-90 duration-300 ease-out group">
<span class="material-symbols-outlined group-hover:opacity-80 transition-opacity">person</span>
