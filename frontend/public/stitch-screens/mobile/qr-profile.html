<body class="bg-surface font-body-md text-on-surface antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-white/60 dark:bg-zinc-900/60 backdrop-blur-xl fixed top-0 w-full z-50 border-b border-white/20 dark:border-zinc-800/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] flex items-center justify-between px-6 h-16 w-full hidden md:flex hover:opacity-80 transition-opacity active:scale-95 duration-200">
<div class="flex items-center gap-4">
<button aria-label="Menu" class="text-green-700 dark:text-green-500 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="text-xl font-bold tracking-tighter text-zinc-900 dark:text-white font-['Inter'] font-semibold tracking-tight">PulseGuard</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="person">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-8 pb-32 md:pt-24 px-gutter flex flex-col items-center w-full max-w-lg mx-auto">
<div class="w-full flex flex-col gap-stack-sm items-center mb-stack-md text-center">
<h1 class="font-headline-lg text-headline-lg text-primary">Medical ID</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Present this secure code to first responders for immediate profile access.</p>
</div>
<!-- Matte Card for QR -->
<div class="bg-surface-container-lowest w-full rounded-xl p-stack-md shadow-[0_30px_60px_-15px_rgba(0,0,0,0.08)] flex flex-col gap-stack-md relative z-10 border border-surface-variant/30">
<!-- Recessed QR Container -->
<div class="bg-surface-container rounded-DEFAULT p-stack-sm shadow-inner aspect-square w-full max-w-[280px] mx-auto flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent pointer-events-none rounded-DEFAULT"></div>
<img class="w-full h-full object-cover mix-blend-multiply opacity-90 filter grayscale contrast-125" data-alt="A highly detailed, crisp, high-contrast black and white QR code centered on a bright, sterile white background. The visual style represents modern clinical luxury, focusing on precision and immediate legibility. The lighting is extra bright and diffused to eliminate any shadows across the barcode pattern itself, ensuring it looks like an active, scannable digital asset. The overall aesthetic is clean, authoritative, and life-saving." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDT97lXcwZ0ouy17bdoxyEQvdUUFGPbjyn-k0YCg349n_kXKBUSTWllhT3HnRvg1kMsvGh6mmHpuTkNQQ9GQgnjhWuVkPmWz5yonKjulDr8z2C04X1AJonohckEusqHqQDK5hLZKcKujb1_Qp-RhIr1Bvngc0r1PxePMkKim01EeioOAJ9cziK302xQZIDc4olH-UuGtBMaOgOkAHj1z5ScOwJZS8BFC2CYrqoPoQIvMUpEqVexXugCBM93CMFFvCCOvOfyuUflfw8"/>
<!-- Scanning Frame Reticle -->
<div class="absolute inset-4 border-2 border-primary/20 rounded-lg pointer-events-none"></div>
<div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-primary rounded-tl-lg pointer-events-none"></div>
<div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-primary rounded-tr-lg pointer-events-none"></div>
<div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-primary rounded-bl-lg pointer-events-none"></div>
<div class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-primary rounded-br-lg pointer-events-none"></div>
</div>
<!-- Identity Section -->
<div class="flex flex-col gap-unit items-center text-center mt-2">
<h2 class="font-headline-md text-headline-md text-on-surface">Sarah Jenkins</h2>
<div class="flex flex-wrap justify-center gap-unit mt-1">
<!-- Status Chip: Blood Type -->
<div class="bg-tertiary-container text-on-tertiary-container rounded-full px-4 py-1.5 flex items-center gap-1.5 shadow-[inset_0_1px_2px_rgba(255,255,255,0.4)]">
<span class="material-symbols-outlined text-[16px]" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-label-sm text-label-sm">O-Negative</span>
</div>
<!-- Status Chip: Active -->
<div class="bg-primary-container text-on-primary-container rounded-full px-4 py-1.5 flex items-center gap-1.5 shadow-[inset_0_1px_2px_rgba(255,255,255,0.2)]">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm">Active Monitoring</span>
</div>
</div>
</div>
<div class="h-px w-full bg-outline-variant/30 my-2"></div>

<div class="flex flex-col gap-unit">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest pl-2">Primary Contact</h3>
<div class="bg-surface-container-low rounded-lg p-stack-sm flex items-center gap-stack-sm border border-outline-variant/20">
<div class="bg-error-container text-on-error-container w-12 h-12 rounded-full flex items-center justify-center shrink-0 shadow-[inset_0_2px_4px_rgba(255,255,255,0.5)]">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
</div>
<div class="flex flex-col flex-grow">
<span class="font-body-md text-body-md font-semibold text-on-surface">Michael Jenkins</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Husband • +1 (555) 019-2834</span>
</div>
<button aria-label="Call Contact" class="bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="call" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
</div>
</div>

<!-- Inactive: home -->

<span class="material-symbols-outlined" data-icon="home">home</span>
</button>
<!-- Inactive: insights -->
<button aria-label="insights" class="flex flex-col items-center justify-center text-zinc-400 h-12 w-12 hover:text-green-600 dark:hover:text-green-300 transition-colors active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</button>
<!-- Inactive: emergency_home -->
<button aria-label="emergency_home" class="flex flex-col items-center justify-center text-zinc-400 h-12 w-12 hover:text-green-600 dark:hover:text-green-300 transition-colors active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="emergency_home">emergency_home</span>
</button>
<!-- Inactive: chat_bubble -->

<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</button>

<button aria-current="page" aria-label="person" class="flex flex-col items-center justify-center bg-green-50 dark:bg-green-950/30 text-green-700 dark:text-green-400 rounded-full w-12 h-12 shadow-inner active:scale-90 duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
