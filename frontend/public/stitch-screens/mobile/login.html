<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background min-h-screen flex flex-col items-center justify-center p-gutter relative overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- Decorative ambient blur for Clinical Luxury feel -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-fixed-dim blur-[100px] opacity-30 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed blur-[120px] opacity-20 pointer-events-none"></div>
<!-- Main Auth Container (Matte Card) -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-lg p-container-padding shadow-[0_40px_60px_rgba(0,0,0,0.04)] relative z-10 flex flex-col items-center border border-white/50 backdrop-blur-sm">
<!-- 3D Focal Asset -->
<div class="w-24 h-24 mb-stack-md rounded-full shadow-[0_20px_40px_rgba(0,101,44,0.15)] overflow-hidden border-4 border-surface-container-lowest flex-shrink-0 relative">
<img alt="PulseGuard Bio-Metric Logo" class="w-full h-full object-cover" data-alt="A high-fidelity, glossy 3D render of a stylized, minimalist human heart intertwined with a glowing digital pulse line. The object floats in a pristine, bright white medical studio environment with soft, diffuse lighting and a subtle matte backdrop. The color palette emphasizes clean clinical whites, soft sage greens, and a deep, authoritative brand green accent. The mood is calm, secure, and technologically advanced, conveying a sense of premium healthcare precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDK4J2zXS6VasFIa-Gr8_jqsQaiI_IPT7sraKngZCzKTl9DXCU3HskI9YqOM7uAtj3jdS2KlOLpO8iyb6z7sxNgPUXrnGoEYES87YzsOn_5UySK6W7hlsAHEBCL70j-M3nMR082e289woiKIwiDiXR2o0gdYL0nTYk73MDvgfMJt7PwrJHOUZ9RVXNDr3P5j8q2BcRGwd9k5SW-UE1B8YH4gmSyhqVHepaW2gEjglufzFxhfydxkCC40v_unodSpvmrJtTH86g05CE"/>
</div>
<!-- Header -->
<div class="text-center w-full mb-stack-lg">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight mb-unit">PulseGuard</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Clinical-grade monitoring portal</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface px-4" for="email">Email Address</label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">mail</span>
<input class="w-full h-[56px] rounded-full bg-surface-container shadow-inner border-0 pl-14 pr-6 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="email" placeholder="Enter your clinical ID or email" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface px-4" for="password">Password</label>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">lock</span>
<input class="w-full h-[56px] rounded-full bg-surface-container shadow-inner border-0 pl-14 pr-6 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="w-full text-right px-4 mt-1">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-variant transition-colors" href="#">Recovery key?</a>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[60px] mt-unit bg-primary rounded-full flex items-center justify-between px-2 shadow-[0_12px_24px_rgba(0,101,44,0.2)] hover:shadow-[0_16px_32px_rgba(0,101,44,0.25)] hover:bg-[#005a27] transition-all active:scale-[0.98] group" type="submit">
<span class="pl-6 font-label-sm text-label-sm text-on-primary uppercase tracking-widest">Authenticate</span>
<div class="w-12 h-12 rounded-full bg-on-primary/10 flex items-center justify-center group-hover:bg-on-primary/20 transition-colors">
<span class="material-symbols-outlined text-on-primary">arrow_forward</span>
</div>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-4 my-stack-md">
<div class="h-[1px] bg-surface-dim flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">or</span>
<div class="h-[1px] bg-surface-dim flex-1"></div>
</div>
<!-- Alternate Authentication -->
<div class="w-full flex gap-stack-sm">
<button class="flex-1 h-[52px] rounded-full bg-surface-container-lowest border border-outline-variant flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors shadow-sm">
<span class="material-symbols-outlined text-on-surface">fingerprint</span>
<span class="font-label-sm text-label-sm text-on-surface">Biometric</span>
</button>
<button class="flex-1 h-[52px] rounded-full bg-surface-container-lowest border border-outline-variant flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors shadow-sm">
<span class="material-symbols-outlined text-on-surface">badge</span>
<span class="font-label-sm text-label-sm text-on-surface">Staff ID</span>
</button>
</div>
</main>
</body></html>
